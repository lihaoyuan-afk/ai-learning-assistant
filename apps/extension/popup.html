<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentLearn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      width: 340px;
      background: #f8fafc;
      color: #1e293b;
    }
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { font-weight: 700; font-size: 15px; color: #5b6af8; }
    .brand span { font-weight: 400; font-size: 12px; color: #94a3b8; margin-left: 4px; }
    .settings-btn {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 16px; line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    .settings-btn:hover { color: #5b6af8; background: #f1f5f9; }

    .main { padding: 14px 16px; }

    .url-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      word-break: break-all;
      font-size: 12px;
      color: #475569;
      max-height: 52px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .url-box.no-url { color: #94a3b8; font-style: italic; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #5b6af8; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4855e8; }
    .btn-secondary { background: #f1f5f9; color: #475569; margin-top: 8px; }
    .btn-secondary:hover:not(:disabled) { background: #e2e8f0; }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.info { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .status.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .status.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .status.show { display: block; }

    .status-title { font-weight: 600; margin-bottom: 3px; }
    .status a { color: inherit; text-decoration: underline; }

    /* Settings panel */
    .settings-panel {
      padding: 14px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: none;
    }
    .settings-panel.show { display: block; }
    .settings-panel label {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .settings-panel label:first-child { margin-top: 0; }
    .settings-panel input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      color: #1e293b;
    }
    .settings-panel input:focus { border-color: #5b6af8; }
    .save-row { display: flex; gap: 8px; margin-top: 10px; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">AgentLearn <span>知识导入</span></div>
    <button class="settings-btn" id="toggleSettings" title="设置">⚙</button>
  </div>

  <div class="main" id="mainPanel">
    <div class="url-box" id="urlBox">加载中…</div>
    <button class="btn btn-primary" id="importBtn" disabled>导入到知识库</button>
    <div class="status" id="statusBox"></div>
    <button class="btn btn-secondary" id="openBtn" style="display:none">
      前往查看文档 →
    </button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <label>后端 API 地址</label>
    <input type="url" id="apiUrl" placeholder="https://..." />
    <label>访问密码（没有请留空）</label>
    <input type="password" id="apiPassword" placeholder="lihaoyuan123" />
    <div class="save-row">
      <button class="btn btn-primary" id="saveSettings" style="flex:1">保存</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
